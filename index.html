<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המסע אל היעדים - גיא</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #141622;
            --panel-bg: #0f1016;
            --text-main: #ffffff;
            --text-muted: #848b9c;
            --accent-green: #03dac6;
            --accent-orange: #ffb74d;
            --border-color: rgba(255, 255, 255, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 14px 120px 14px;
            direction: rtl;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 15px; }
        header h1 {
            font-size: 24px; margin: 0 0 4px 0; font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a5afc8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-muted); margin: 0; font-size: 13px; }

        .pizza-timer-card {
            background: linear-gradient(135deg, #241414 0%, #141622 100%);
            border: 1px solid rgba(239, 83, 80, 0.15);
            border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .timer-title { font-size: 13px; color: #ef5350; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 8px; }
        .timer-display { display: flex; justify-content: center; gap: 12px; direction: ltr; }
        .timer-segment { display: flex; flex-direction: column; align-items: center; }
        .timer-num { font-size: 24px; font-weight: 900; color: #ffffff; font-family: monospace; }
        .timer-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-family: sans-serif; }

        .app-page { display: none; }
        .app-page.active { display: block; }
        .loading-screen { text-align: center; padding: 50px; color: var(--accent-green); font-weight: bold; }

        .goals-grid { display: flex; flex-wrap: wrap; gap: 12px; width: 100%; }
        .goal-box {
            background-color: var(--card-bg); border-radius: 20px; padding: 16px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; border: 1px solid var(--border-color); cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); overflow: hidden;
            width: calc(50% - 6px); box-sizing: border-box;
        }

        .h-small { height: 120px; }
        .h-medium { height: 155px; }
        .h-large { height: 195px; }

        .goal-glow { position: absolute; bottom: -30px; left: -30px; right: -30px; height: 60px; filter: blur(20px); opacity: 0.12; pointer-events: none; }
        .goal-title { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 6px; }
        
        .goal-live-res { font-size: 11px; color: #ced4e2; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 8px; }
        .goal-live-date { font-size: 9px; color: var(--text-muted); font-weight: bold; margin-bottom: 4px; }

        .goal-footer { display: flex; flex-direction: column; gap: 4px; margin-top: auto; width: 100%; }
        .goal-status-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .goal-pct { font-size: 18px; font-weight: 800; }
        .goal-status { font-size: 10px; color: var(--text-muted); }

        .mini-progress { background-color: rgba(255, 255, 255, 0.05); border-radius: 10px; height: 4px; width: 100%; overflow: hidden; }
        .mini-bar { height: 100%; border-radius: 10px; }

        .period-progress-card {
            background: linear-gradient(135deg, #191b28 0%, #12141f 100%);
            border-radius: 18px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .accordion-item { background-color: var(--card-bg); border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .accordion-header {
            padding: 16px; font-weight: 700; font-size: 14px; cursor: pointer;
            background: rgba(255,255,255,0.01); display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-content {
            padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 0.25s ease-out, padding 0.25s ease; font-size: 13px; color: #ced4e2; line-height: 1.5;
        }
        .accordion-content.open { padding: 16px; max-height: max-content; overflow: visible; }

        .input-block { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .text-input-cell {
            background: #1a1c28; color: #fff; border: 1px solid #2d3142; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; box-sizing: border-box;
        }
        .action-btn { background: var(--accent-green); color: #000; border: none; padding: 11px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; width: 100%; margin-top: 5px; }

        .details-panel {
            position: fixed; top: 0; bottom: 0; left: 0; right: 0; background-color: var(--panel-bg); z-index: 1000; display: none; padding: 20px; flex-direction: column; overflow-y: auto;
        }
        .btn-back { background-color: #1e202e; color: var(--text-main); border: 1px solid #2d3142; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .panel-body { background-color: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid var(--border-color); }
        
        .log-card-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px; padding: 14px; margin-bottom: 12px; font-size: 13px; position: relative;
        }
        .log-badge { position: absolute; top: 12px; left: 12px; font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: bold; }
        .badge-w { background: rgba(3, 218, 198, 0.15); color: var(--accent-green); }
        .badge-m { background: rgba(255, 183, 77, 0.15); color: var(--accent-orange); }

        .log-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; font-weight: bold; color: var(--accent-green); }
        .log-section-title { font-size: 11px; color: var(--text-muted); font-weight: bold; margin-top: 6px; margin-bottom: 2px; }

        .bottom-nav {
            position: fixed; bottom: 15px; left: 12px; right: 12px; background-color: rgba(20, 22, 34, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 99;
        }
        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-weight: 600; }
        .nav-item.active { color: #ffffff; }
        .nav-icon { font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">🔄 מסתנכרן ומחשב נתונים בלייב מ-Google Sheets...</div>

    <div id="app-content" style="display: none;">
        
        <div class="pizza-timer-card">
            <div class="timer-title">🍕 זמן ללא פיצה (תחילת האתגר)</div>
            <div class="timer-display" id="pizzaTimer">
                <div class="timer-segment"><span class="timer-num" id="t-days">00</span><span class="timer-label">ימים</span></div>
                <div class="timer-segment"><span class="timer-num" id="t-hours">00</span><span class="timer-label">שעות</span></div>
                <div class="timer-segment"><span class="timer-num" id="t-mins">00</span><span class="timer-label">דקות</span></div>
                <div class="timer-segment"><span class="timer-num" id="t-secs">00</span><span class="timer-label">שניות</span></div>
            </div>
        </div>

        <div id="page-dashboard" class="app-page active">
            <div class="goals-grid" id="goalsGrid"></div>
        </div>

        <div id="page-weekly" class="app-page">
            <div class="period-progress-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;">
                    <span>קירבה לסיום משימות השבוע:</span>
                    <span id="weekly-pct-text" style="font-weight:bold; color:var(--accent-green);">0%</span>
                </div>
                <div class="mini-progress"><div id="weekly-pct-bar" class="mini-bar" style="width: 0%; background: var(--accent-green);"></div></div>
            </div>
            <div id="weeklyAccordionContainer"></div>
        </div>

        <div id="page-monthly" class="app-page">
            <div class="period-progress-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;">
                    <span>קירבה לסיכום יעדי החודש:</span>
                    <span id="monthly-pct-text" style="font-weight:bold; color:#ffb74d;">0%</span>
                </div>
                <div class="mini-progress"><div id="monthly-pct-bar" class="mini-bar" style="width: 0%; background: #ffb74d;"></div></div>
            </div>
            <div id="monthlyAccordionContainer"></div>
        </div>

        <div id="page-raw" class="app-page">
            <div id="rawAccordionContainer"></div>
        </div>
    </div>

    <div class="details-panel" id="detailsPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button class="btn-back" onclick="closePanel()">✕ סגור</button>
            <h2 id="panelTitle" style="margin:0; font-size:18px; font-weight:800;"></h2>
        </div>
        <div class="panel-body" id="panelContent"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="switchPage('dashboard', this)"><span class="nav-icon">📊</span><span>דשבורד</span></a>
        <a href="#" class="nav-item" onclick="switchPage('weekly', this)"><span class="nav-icon">📅</span><span>שבועי</span></a>
        <a href="#" class="nav-item" onclick="switchPage('monthly', this)"><span class="nav-icon">🗓️</span><span>חודשי</span></a>
        <a href="#" class="nav-item" onclick="switchPage('raw', this)"><span class="nav-icon">🔍</span><span>גולמי</span></a>
    </nav>

    <script>
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwOa7fzsk5tc3JT4-aIVEbriHXjZYy01fcjITYCbCtjp8gfppFp5wdNQInDCMIEwKmL/exec";

        let localData = { dashboard: [], weekly: [], monthly: [], rawLogs: [] };
        let weeklyDoneMap = {};
        let monthlyDoneMap = {};

        const sizeMapping = { 1: "h-medium", 2: "h-large", 3: "h-large", 4: "h-small", 5: "h-small", 6: "h-small", 7: "h-medium" };

        function getInsensitiveKey(obj, keyName) {
            if (!obj) return "";
            const target = keyName.toLowerCase().trim();
            for (let k in obj) { if (k.toLowerCase().trim() === target) return obj[k]; }
            return "";
        }

        function startPizzaTimer() {
            const startDate = new Date("2026-03-08T00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const difference = now - startDate;
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);
                document.getElementById("t-days").innerText = days < 10 ? "0" + days : days;
                document.getElementById("t-hours").innerText = hours < 10 ? "0" + hours : hours;
                document.getElementById("t-mins").innerText = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("t-secs").innerText = seconds < 10 ? "0" + seconds : seconds;
            }, 1000);
        }

        // שימוש במנגנון JSONP עוקף חסימות אבטחה של דפדפנים
        function fetchCloudData() {
            const script = document.createElement('script');
            script.src = CLOUD_API_URL + "?callback=handleCloudResponse";
            script.onerror = function() {
                document.getElementById('loading').innerText = "❌ שגיאה בסנכרון. ודא שביצעת פריסה מחדש (New Version) בשרת של גוגל.";
            };
            document.body.appendChild(script);
        }

        // הפונקציה שמופעלת מיד ברגע שגוגל מחזיר את התשובה
        function handleCloudResponse(response) {
            localData = response;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderDashboard();
            renderPeriodAccordions('weekly');
            renderPeriodAccordions('monthly');
            renderRawAccordion();
        }

        function getLatestLogForCategory(categoryName) {
            const logs = localData.rawLogs.filter(l => l.category.toLowerCase().trim() === categoryName.toLowerCase().trim());
            if (logs.length === 0) return { res: "אין תיעוד תוצאה עדיין", date: "" };
            return {
                res: logs[logs.length - 1].textRes || "אין תיעוד תוצאה עדיין",
                date: logs[logs.length - 1].date || ""
            };
        }

        function renderDashboard() {
            const grid = document.getElementById('goalsGrid');
            grid.innerHTML = '';
            const sortedDashboard = [...localData.dashboard].sort((a,b) => parseInt(getInsensitiveKey(a, 'id')) - parseInt(getInsensitiveKey(b, 'id')));

            sortedDashboard.forEach(goal => {
                const id = getInsensitiveKey(goal, 'id');
                const title = getInsensitiveKey(goal, 'title');
                const current = parseFloat(getInsensitiveKey(goal, 'current')) || 0;
                const target = parseFloat(getInsensitiveKey(goal, 'target')) || 1;
                const unit = getInsensitiveKey(goal, 'unit');
                const pct = Math.min(current / target, 1);
                const color = `hsl(${pct * 120}, 85%, 48%)`;
                const sizeClass = sizeMapping[id] || "h-medium";

                let categoryKey = "כושר ומתח";
                if(title.includes("חיסכון") || title.includes("כסף")) categoryKey = "פיננסי וחיסכון";
                if(title.includes("ספרים")) categoryKey = "ספרים";
                if(title.includes("פודקאסט") || title.includes("רשומים")) categoryKey = "פודקאסט";
                if(title.includes("התנדבות") || title.includes("קהילה")) categoryKey = "התנדבות";
                if(title.includes("הופעה")) categoryKey = "הופעה מול קהל";
                if(title.includes("איטלקית")) categoryKey = "איטלקית";

                const latestLog = getLatestLogForCategory(categoryKey);

                const box = document.createElement('div');
                box.className = `goal-box ${sizeClass}`;
                box.onclick = () => openPanel(title, categoryKey);
                box.innerHTML = `
                    <div class="goal-glow" style="background-color: ${color};"></div>
                    <div class="goal-title">${title}</div>
                    <div class="goal-live-res">${latestLog.res}</div>
                    ${latestLog.date ? `<div class="goal-live-date">תאריך: ${latestLog.date}</div>` : ''}
                    <div class="goal-footer">
                        <div class="goal-status-row">
                            <div class="goal-pct" style="color: ${color};">${Math.round(pct * 100)}%</div>
                            <div class="goal-status">${current.toLocaleString()}/${target.toLocaleString()} ${unit}</div>
                        </div>
                        <div class="mini-progress"><div class="mini-bar" style="width:${pct*100}%; background-color:${color};"></div></div>
                    </div>`;
                grid.appendChild(box);
            });
        }

        function renderPeriodAccordions(period) {
            const container = document.getElementById(`${period}AccordionContainer`);
            container.innerHTML = '';
            const list = period === 'weekly' ? localData.weekly : localData.monthly;

            list.forEach((item, index) => {
                const goalTitle = getInsensitiveKey(item, 'goaltitle');
                const periodTarget = getInsensitiveKey(item, 'periodtarget');
                const uniqueId = `${period}-${index}`;
                
                const card = document.createElement('div');
                card.className = 'accordion-item';
                card.innerHTML = `
                    <div class="accordion-header" onclick="toggleLocalAccordion('${uniqueId}')">
                        <span>${goalTitle}</span><span id="arrow-${uniqueId}">▼</span>
                    </div>
                    <div class="accordion-content" id="content-${uniqueId}">
                        <div style="margin-bottom: 4px; font-weight: bold; color: var(--text-muted);">היעד שהוצב:</div>
                        <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size:13px;">${periodTarget}</div>
                        <div class="input-block">
                            <div style="font-weight: bold; font-size: 12px; margin-bottom:4px; color:var(--accent-green);">1. תיעוד גולמי חופשי:</div>
                            <input type="text" id="done-${uniqueId}" class="text-input-cell" style="margin-bottom:6px;" placeholder="מה עשיתי עד כה (TextDone)...">
                            <input type="text" id="res-${uniqueId}" class="text-input-cell" placeholder="תוצאות שהושגו (TextRes)...">
                            <div style="font-weight: bold; font-size: 12px; margin-top:8px; margin-bottom:4px; color:#ffb74d;">2. עדכון סטטיסטיקה (לדשבורד):</div>
                            <input type="number" id="num-${uniqueId}" class="text-input-cell" placeholder="הקלד ערך מספרי עדכני כללי (Current)...">
                            <button class="action-btn" style="background: ${period === 'weekly' ? 'var(--accent-green)' : '#ffb74d'}" onclick="processAndSend('${period}', ${index}, '${goalTitle}', '${uniqueId}')">שמור וסנכרן לענן ✓</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleLocalAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            content.classList.toggle('open');
            arrow.innerText = content.classList.contains('open') ? '▲' : '▼';
        }

        async function processAndSend(period, index, goalTitle, uniqueId) {
            const txtDone = document.getElementById(`done-${uniqueId}`).value.trim();
            const txtRes = document.getElementById(`res-${uniqueId}`).value.trim();
            const numVal = document.getElementById(`num-${uniqueId}`).value.trim();

            if(!txtDone && !txtRes && !numVal) {
                alert("אנא מלא לפחות שדה אחד לפני השמירה!");
                return;
            }

            const now = new Date();
            const dateStr = `${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`;

            let category = "כושר ומתח";
            if(goalTitle.includes("חיסכון") || goalTitle.includes("כסף") || goalTitle.includes("פיננסי")) category = "פיננסי וחיסכון";
            if(goalTitle.includes("ספרים")) category = "ספרים";
            if(goalTitle.includes("פודקאסט") || goalTitle.includes("רשומים")) category = "פודקאסט";
            if(goalTitle.includes("התנדבות") || goalTitle.includes("קהילה")) category = "התנדבות";
            if(goalTitle.includes("הופעה")) category = "הופעה מול קהל";
            if(goalTitle.includes("איטלקית")) category = "איטלקית";

            const payload = {
                action: "completeTask",
                category: category,
                date: dateStr,
                goalTitle: goalTitle,
                text: `${period === 'weekly' ? 'יעד שבועי' : 'יעד חודשי'}`, 
                textDone: txtDone || "לא תועד שינוי",
                textRes: txtRes || "לא תועד שינוי",
                updateNumericValue: numVal,
                periodType: period === 'weekly' ? "שבועי" : "חודשי"
            };

            try {
                alert("שומר בענן גוגל...");
                await fetch(CLOUD_API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    cache: "no-cache",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if(period === 'weekly') weeklyDoneMap[index] = true;
                if(period === 'monthly') monthlyDoneMap[index] = true;
                updatePeriodUIPercentages(period);
                
                document.getElementById(`done-${uniqueId}`).value = '';
                document.getElementById(`res-${uniqueId}`).value = '';
                document.getElementById(`num-${uniqueId}`).value = '';
                
                alert("הסנכרון הושלם בהצלחה!");
                fetchCloudData(); 
            } catch(err) { alert("שגיאה בתקשורת."); }
        }

        function updatePeriodUIPercentages(period) {
            const map = period === 'weekly' ? weeklyDoneMap : monthlyDoneMap;
            const total = period === 'weekly' ? localData.weekly.length : localData.monthly.length;
            const checked = Object.keys(map).length;
            const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
            document.getElementById(`${period}-pct-text`).innerText = `${pct}%`;
            document.getElementById(`${period}-pct-bar`).style.width = `${pct}%`;
        }

        function openPanel(title, categoryKey) {
            document.getElementById('panelTitle').innerText = title;
            const filteredLogs = localData.rawLogs.filter(l => l.category.toLowerCase().trim() === categoryKey.toLowerCase().trim());
            
            let content = '<h3>🏆 היסטוריית רשומות מה-Sheets:</h3>';
            if(filteredLogs.length === 0) {
                content += `<p style="font-size:12px; color:var(--text-muted);">אין תיעוד זמין.</p>`;
            } else {
                filteredLogs.forEach(log => {
                    const isWeekly = log.periodType !== "חודשי";
                    const badgeClass = isWeekly ? "badge-w" : "badge-m";
                    const badgeText = isWeekly ? "שבועי" : "חודשי";

                    content += `
                        <div class="log-card-item">
                            <span class="log-badge ${badgeClass}">${badgeText}</span>
                            <div class="log-card-header"><span>📅 ${log.date}</span></div>
                            <div class="log-section-title">🏃 מה עשיתי עד כה:</div>
                            <div style="color:#ced4e2;">${log.textDone || '-'}</div>
                            <div class="log-section-title">🏆 תוצאות שהושגו:</div>
                            <div style="color:var(--accent-green); font-weight:500;">${log.textRes || '-'}</div>
                        </div>`;
                });
            }
            document.getElementById('panelContent').innerHTML = content;
            document.getElementById('detailsPanel').style.display = 'flex';
        }

        function closePanel() { document.getElementById('detailsPanel').style.display = 'none'; }

        function switchPage(pageId, navItem) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            navItem.classList.add('active');
        }

        function renderRawAccordion() {
            const container = document.getElementById('rawAccordionContainer');
            container.innerHTML = '';
            const categories = ["כושר ומתח", "פיננסי וחיסכון", "ספרים", "הופעה מול קהל", "התנדבות", "איטלקית", "פודקאסט"];
            
            categories.forEach((cat, index) => {
                const logs = localData.rawLogs.filter(l => l.category.toLowerCase().trim() === cat.toLowerCase().trim());
                let htmlContent = '';
                if(logs.length === 0) {
                    htmlContent = `<div style="padding:10px; color:var(--text-muted);">אין רשומות גולמיות זמינות.</div>`;
                } else {
                    logs.forEach(log => {
                        const isWeekly = log.periodType !== "חודשי";
                        const badgeClass = isWeekly ? "badge-w" : "badge-m";
                        const badgeText = isWeekly ? "שבועי" : "חודשי";
                        htmlContent += `
                            <div class="log-card-item" style="background: rgba(0,0,0,0.15); margin-bottom:8px;">
                                <span class="log-badge ${badgeClass}" style="top:8px; left:8px;">${badgeText}</span>
                                <div class="log-card-header"><span>${log.date}</span></div>
                                <div style="margin-top:4px;"><b style="color:var(--text-muted); font-size:11px;">מה נעשה:</b> ${log.textDone}</div>
                                <div style="margin-top:4px;"><b style="color:var(--accent-green); font-size:11px;">תוצאה:</b> ${log.textRes}</div>
                            </div>`;
                    });
                }
                const item = document.createElement('div');
                item.className = 'accordion-item';
                item.innerHTML = `
                    <div class="accordion-header" onclick="toggleRawAccordion(${index})">
                        <span>${cat}</span><span id="raw-arrow-${index}">▼</span>
                    </div>
                    <div class="accordion-content" id="raw-content-${index}">${htmlContent}</div>`;
                container.appendChild(item);
            });
        }

        function toggleRawAccordion(index) {
            const content = document.getElementById(`raw-content-${index}`);
            const arrow = document.getElementById(`raw-arrow-${index}`);
            content.classList.toggle('open');
            arrow.innerText = content.classList.contains('open') ? '▲' : '▼';
        }

        startPizzaTimer();
        fetchCloudData();
    </script>
</body>
</html>
