<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המסע אל היעדים - גיא</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161822;
            --text-main: #ffffff;
            --text-muted: #8e94a6;
            --border-color: rgba(255, 255, 255, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 25px 20px 100px 20px;
            direction: rtl;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5afc8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
            font-weight: 500;
        }

        /* רשת ריבועים סימטרית ונקייה לחלוטין */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* כרטיסיית ריבוע פרימיום משודרגת */
        .goal-box {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1 / 1; /* סימטריה ריבועית קבועה */
            position: relative;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .goal-box:active {
            transform: scale(0.94);
        }

        /* אפקט הילה (Glow) מעודן לפי צבע היעד בתחתית/מסביב לכרטיס */
        .goal-glow {
            position: absolute;
            bottom: -20px; left: -20px; right: -20px;
            height: 60px;
            filter: blur(25px);
            opacity: 0.15;
            pointer-events: none;
            transition: background-color 0.3s ease;
        }

        .goal-title {
            font-weight: 700;
            font-size: 16px;
            line-height: 1.4;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .goal-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .goal-status-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .goal-pct {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .goal-status {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        /* מד התקדמות מינימליסטי וחלק */
        .mini-progress {
            background-color: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            height: 6px;
            width: 100%;
            overflow: hidden;
        }

        .mini-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        /* סרגל ניווט תחתון יוקרתי ומעוגל */
        .bottom-nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background-color: rgba(22, 24, 34, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 999;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-icon {
            font-size: 18px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>המסע אל היעדים</h1>
        <p>לוח בקרה אישי מובנה</p>
    </header>

    <div class="goals-grid" id="goalsGrid"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span class="nav-icon">📊</span><span>דשבורד</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">📅</span><span>יומן שבועי</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">📝</span><span>הזנה</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">🔍</span><span>גולמי</span></a>
    </nav>

    <script>
        // נתוני המטרות המעודכנים לאחר התיקונים שלך
        const goalsData = [
            { id: 1, title: "💪 15 מתח", current: 4, target: 15, unit: "חזרות" },
            { id: 2, title: "💰 חיסכון כספי", current: 67500, target: 100000, unit: "ש״ח" },
            { id: 3, title: "📚 קריאת ספרים", current: 6, target: 15, unit: "ספרים" }, // עודכן ל-6 בעקבות חילוץ הספרים הנוספים
            { id: 4, title: "🎤 הופעה מול קהל", current: 100, target: 100, unit: "אנשים" },
            { id: 5, title: "🤝 התנדבות קהילה", current: 0, target: 50, unit: "שעות" },
            { id: 6, title: "🇮🇹 שיחה באיטלקית", current: 10, target: 10, unit: "דקות" },
            { id: 7, title: "🎙️ רשומים ביוטיוב", current: 28, target: 100, unit: "רשומים" }
        ];

        // פונקציית סקאלת הצבעים המדויקת (0% אדום -> 50% צהוב -> 100% ירוק)
        function getScaleColor(pct) {
            const hue = pct * 120; // 0 ל-120
            return `hsl(${hue}, 85%, 50%)`;
        }

        function renderDashboard() {
            const grid = document.getElementById('goalsGrid');
            grid.innerHTML = '';

            goalsData.forEach(goal => {
                const pct = Math.min(goal.current / goal.target, 1);
                const color = getScaleColor(pct);

                const box = document.createElement('div');
                box.className = 'goal-box';

                box.innerHTML = `
                    <div class="goal-glow" style="background-color: ${color};"></div>
                    <div class="goal-title">${goal.title}</div>
                    <div class="goal-footer">
                        <div class="goal-status-row">
                            <div class="goal-pct" style="color: ${color};">${Math.round(pct * 100)}%</div>
                            <div class="goal-status">${goal.current.toLocaleString()}/${goal.target.toLocaleString()}</div>
                        </div>
                        <div class="mini-progress">
                            <div class="mini-bar" style="width: ${pct * 100}%; background-color: ${color}; box-shadow: 0 0 10px ${color}80;"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(box);
            });
        }

        renderDashboard();
    </script>
</body>
</html>
