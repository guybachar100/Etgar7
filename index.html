<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המסע אל היעדים - גיא</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #161616;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 20px 90px 20px;
            direction: rtl;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 26px;
            margin: 0 0 5px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        /* רשת ריבועים סימטרית כמו בעיצוב שרצית */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* כרטיסיית ריבוע ייעודית */
        .goal-box {
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1 / 1; /* ריבוע מושלם */
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #000000; /* טקסט כהה לקריאות מקסימלית על הרקע הצבעוני */
        }

        .goal-box:active {
            transform: scale(0.95);
        }

        .goal-title {
            font-weight: 800;
            font-size: 18px;
            line-height: 1.3;
        }

        .goal-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .goal-pct {
            font-size: 20px;
            font-weight: 900;
        }

        .goal-status {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.8;
        }

        /* מד התקדמות פנימי קטן בריבוע */
        .mini-progress {
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            height: 5px;
            width: 100%;
        }

        .mini-bar {
            background-color: rgba(0, 0, 0, 0.7);
            height: 100%;
            border-radius: 10px;
        }

        /* ממשק אישי לכל משימה (חלון החלקה) */
        .details-panel {
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background-color: var(--panel-bg);
            z-index: 100;
            display: none;
            padding: 25px;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .btn-back {
            background-color: #262626;
            color: var(--text-main);
            border: 1px solid #363636;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .panel-body {
            background-color: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* עיצוב רשימת ספרים דיגיטלית בממשק הפנימי */
        .book-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .book-status-v {
            color: #03dac6;
            font-weight: bold;
        }

        /* סרגל ניווט תחתון חלק */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: rgba(22, 22, 22, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 14px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .nav-item.active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <h1>המסע אל היעדים</h1>
        <p>לוח בקרה אישי שבועי</p>
    </header>

    <div class="goals-grid" id="goalsGrid"></div>

    <div class="details-panel" id="detailsPanel">
        <div class="panel-header">
            <button class="btn-back" onclick="closePanel()">✕ סגור ממשק</button>
            <h2 id="panelTitle" style="margin: 0; font-size: 22px; font-weight: 800;"></h2>
        </div>
        <div class="panel-body" id="panelContent"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span>📊</span><span>דשבורד</span></a>
        <a href="#" class="nav-item"><span>📅</span><span>יומן שבועי</span></a>
        <a href="#" class="nav-item"><span>🤖</span><span>ייעוץ AI</span></a>
    </nav>

    <script>
        // בסיס הנתונים המשולב מהמטרות ומטבלת הוורד שלך
        const goalsData = [
            { id: 1, title: "15 מתח", current: 4, target: 15, unit: "חזרות", type: "fitness", content: "<h3>מעקב אימונים שבועי:</h3><p>אימון שבוע 11 הושלם בהצלחה. יש לשמור על רצף של 3 אימונים בשבוע כדי להעלות את רף החזרות במקבילים ובמתח.</p>" },
            { id: 2, title: "חיסכון כספי", current: 67500, target: 100000, unit: "ש״ח", type: "money", content: "<h3>מצב קופות וחיסכון:</h3><p>נכון לשבוע 11 נצברו כ-67,500 ש״ח. מתוכם נבדקו קופות הגמל וההפקדות הקבועות מהשכר ומעבודות נוספות.</p>" },
            { id: 3, title: "קריאת 15 ספרים", current: 5, target: 15, unit: "ספרים", type: "books", content: `
                <h3>📚 ספרייה דיגיטלית אישית:</h3>
                <div class="book-item"><span class="book-status-v">✓</span> <span>השקעות לעצלנים</span></div>
                <div class="book-item"><span style="color:#ffb74d">⏳</span> <span>הספר של אהרון ברק (עמוד 120)</span></div>
                <div class="book-item"><span style="color:#666">○</span> <span>ספר שלישי (טרם הוחלט)</span></div>
            ` },
            { id: 4, title: "הופעה מול קהל", current: 100, target: 100, unit: "אנשים", type: "completed", content: "<h3>🎉 היעד הושג!</h3><p>הופעה מלאה ומוצלחת מול 100 אנשים בשיתוף הפעולה המוזיקלי והחברתי.</p>" },
            { id: 5, title: "התנדבות בקהילה", current: 0, target: 50, unit: "שעות", type: "volunteer", content: "<h3>🤝 תרומה לקהילה וחסד:</h3><p>תוכנית פנייה לעמותת 'מכל הלב' לעזרה בפינוי בתים וסיוע למשפחות נזקקות. יעד: 50 שעות פעילות.</p>" },
            { id: 6, title: "שיחה באיטלקית", current: 10, target: 10, unit: "דקות", type: "completed", content: "<h3>🇮🇹 האתגר הושלם בהצלחה!</h3><p>ניהול שיחה רציפה ושוטפת של 10 דקות מלאות באיטלקית עם סימונה, לאחר התמדה יומיומית בדואולינגו ושיעורים שבועיים.</p>" },
            { id: 7, title: "רשומים לפודקאסט", current: 28, target: 100, unit: "רשומים", type: "podcast", content: "<h3>🎙️ WiseGuyPodcast</h3><p>מספר רשומים עדכני: <b>28</b> מתוך 100.<br>הנתון נטען ומעודכן בלשונית הניהול ישירות לחשבון היוטיוב שלך.</p>" }
        ];

        // פונקציית סקאלת הצבעים המדויקת שביקשת (אדום -> צהוב -> ירוק)
        function getScaleColor(pct) {
            // 0% = אדום מוחלט (Hue 0)
            // 50% = צהוב מוחלט (Hue 60)
            // 100% = ירוק מוחלט (Hue 120)
            const hue = pct * 120;
            // שימוש בטווח צבעים עשיר ונעים לעין (Saturation 85%, Lightness 55%)
            return `hsl(${hue}, 90%, 55%)`;
        }

        function renderDashboard() {
            const grid = document.getElementById('goalsGrid');
            grid.innerHTML = '';

            goalsData.forEach(goal => {
                const pct = Math.min(goal.current / goal.target, 1);
                const boxColor = getScaleColor(pct);

                const box = document.createElement('div');
                box.className = 'goal-box';
                box.style.backgroundColor = boxColor;
                box.onclick = () => openPanel(goal);

                box.innerHTML = `
                    <div class="goal-title">${goal.title}</div>
                    <div class="goal-footer">
                        <div class="goal-pct">${Math.round(pct * 100)}%</div>
                        <div class="goal-status">${goal.current.toLocaleString()} / ${goal.target.toLocaleString()} ${goal.unit}</div>
                        <div class="mini-progress">
                            <div class="mini-bar" style="width: ${pct * 100}%"></div>
                        </div>
                    </div>
                `;
                grid.appendChild(box);
            });
        }

        function openPanel(goal) {
            document.getElementById('panelTitle').innerText = goal.title;
            document.getElementById('panelContent').innerHTML = goal.content;
            document.getElementById('detailsPanel').style.display = 'flex';
        }

        function closePanel() {
            document.getElementById('detailsPanel').style.display = 'none';
        }

        // הפעלה ראשונית של הדשבורד
        renderDashboard();
    </script>
</body>
</html>
